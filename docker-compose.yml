services:
  claude-nirvana:
    image: ghcr.io/aldarondo/claude-nirvana:latest
    container_name: claude-nirvana
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    ports:
      - "8769:8769"
    environment:
      - NIRVANA_USERNAME=${NIRVANA_USERNAME}
      - NIRVANA_PASSWORD=${NIRVANA_PASSWORD}
      - NIRVANA_CARD_ID=${NIRVANA_CARD_ID}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-sse}
      - MCP_PORT=${MCP_PORT:-8769}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
