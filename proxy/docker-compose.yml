services:
  nirvana-proxy:
    image: ghcr.io/aldarondo/nirvana-proxy:latest
    container_name: nirvana-proxy
    restart: unless-stopped
    ports:
      - "8444:8444"
      - "8088:8088"
    environment:
      - LOG_BODIES=true
      - PROXY_PORT=8444
      - HTTP_MODE=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
