services:
  nirvana-proxy:
    image: ghcr.io/aldarondo/nirvana-proxy:latest
    container_name: nirvana-proxy
    restart: unless-stopped
    ports:
      - "8443:8443"
      - "8088:8088"
    environment:
      - LOG_BODIES=true
      - PROXY_PORT=8443
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
