name: Build nirvana-proxy image

on:
  push:
    branches: [main]
    paths:
      - proxy/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./proxy
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nirvana-proxy:latest
            ghcr.io/${{ github.repository_owner }}/nirvana-proxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cloudflared and sshpass
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb
          sudo apt-get install -y sshpass

      - name: Deploy to NAS
        env:
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "cat > /tmp/nirvana-proxy-compose.yml" < proxy/docker-compose.yml
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "echo '$SSHPASS' | sudo -S mkdir -p /volume1/docker/nirvana-proxy \
             && echo '$SSHPASS' | sudo -S cp /tmp/nirvana-proxy-compose.yml /volume1/docker/nirvana-proxy/docker-compose.yml \
             && echo '$SSHPASS' | sudo -S /usr/local/bin/docker compose -f /volume1/docker/nirvana-proxy/docker-compose.yml pull \
             && echo '$SSHPASS' | sudo -S /usr/local/bin/docker compose -f /volume1/docker/nirvana-proxy/docker-compose.yml up -d"
