name: Build nirvana-proxy image

on:
  push:
    branches: [main]
    paths:
      - proxy/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./proxy
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nirvana-proxy:latest
            ghcr.io/${{ github.repository_owner }}/nirvana-proxy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Load SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}

      - name: Add NAS to known_hosts
        run: echo "${{ secrets.NAS_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy to NAS
        env:
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          ssh \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "cat > /tmp/nirvana-proxy-compose.yml" < proxy/docker-compose.yml
          ssh \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "sudo mkdir -p /volume1/docker/nirvana-proxy \
             && sudo cp /tmp/nirvana-proxy-compose.yml /volume1/docker/nirvana-proxy/docker-compose.yml \
             && sudo /usr/local/bin/docker compose -f /volume1/docker/nirvana-proxy/docker-compose.yml pull \
             && sudo /usr/local/bin/docker compose -f /volume1/docker/nirvana-proxy/docker-compose.yml up -d"
