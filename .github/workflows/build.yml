name: Build claude-nirvana image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - src/**
      - package*.json
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-nirvana:latest
            ghcr.io/${{ github.repository_owner }}/claude-nirvana:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cloudflared and sshpass
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb
          sudo apt-get install -y sshpass

      - name: Deploy to NAS
        env:
          SSHPASS: ${{ secrets.NAS_SSH_PASSWORD }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "cat > /tmp/claude-nirvana-compose.yml" < docker-compose.yml
          sshpass -e ssh -o StrictHostKeyChecking=no \
            -o "ProxyCommand=cloudflared access ssh --hostname nas-ssh.aldarondo.family --id $CF_CLIENT_ID --secret $CF_CLIENT_SECRET" \
            charles@nas-ssh.aldarondo.family \
            "sudo cp /tmp/claude-nirvana-compose.yml /volume1/docker/claude-nirvana/docker-compose.yml \
             && sudo /usr/local/bin/docker compose -f /volume1/docker/claude-nirvana/docker-compose.yml pull \
             && sudo /usr/local/bin/docker compose -f /volume1/docker/claude-nirvana/docker-compose.yml up -d"
